<sly data-sly-use.templates="core/wcm/components/commons/v1/templates.html"/>
<sly data-sly-use.clientlib="core/wcm/components/commons/v1/templates/clientlib.html"/>
<sly data-sly-call="${clientlib.js @ categories='aemtr.news-list', async=true}"/>
<sly data-sly-set.newsRoot="${properties.newsRoot || '/content/dam/aemtr/news'}"/>

<section class="my-12 bg-stone-50 px-4 py-10 text-slate-950 sm:px-6 lg:px-8"
         data-news-list
         data-news-root="${newsRoot @ context='attribute'}"
         aria-live="polite">
    <div class="mx-auto max-w-7xl">
        <div class="mb-8 flex flex-col gap-3 border-b border-slate-300 pb-6 md:flex-row md:items-end md:justify-between">
            <div>
                <p class="mb-2 text-xs font-bold uppercase tracking-[0.28em] text-teal-700">Actualidad</p>
                <h2 class="text-3xl font-black tracking-normal text-slate-950 md:text-5xl">Noticias</h2>
            </div>
            <p class="max-w-xl text-base leading-7 text-slate-600">
                Ultimas publicaciones y novedades destacadas.
            </p>
        </div>

        <div class="min-h-64">
            <div class="hidden rounded-md border border-amber-300 bg-amber-50 p-4 text-sm font-medium text-amber-900"
                 data-news-error>
                No se han podido cargar las noticias.
            </div>
            <div class="hidden rounded-md border border-slate-300 bg-white p-8 text-center text-slate-600"
                 data-news-empty>
                No hay noticias disponibles.
            </div>
            <div class="grid gap-5 md:grid-cols-2 xl:grid-cols-3" data-news-items></div>
        </div>
    </div>
</section>

<sly data-sly-call="${templates.placeholder @ isEmpty = false}"/>
