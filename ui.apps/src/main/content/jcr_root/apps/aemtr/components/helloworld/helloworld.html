<section class="cmp-helloworld my-8 rounded-lg border border-slate-200 bg-white p-6 shadow-md"
         data-sly-use.model="com.aemtr.core.models.HelloWorldModel">
    <p class="mb-2 text-sm font-semibold uppercase tracking-wide text-teal-700">Componente de ejemplo</p>
    <h2 class="mb-4 text-2xl font-bold text-slate-900">
        ${properties.title || 'Hello World'}
    </h2>
    <p data-sly-test="${properties.text}" class="mb-4 text-lg text-slate-700">
        ${properties.text}
    </p>
    <p data-sly-test="${model.message}" class="rounded-lg bg-slate-100 p-4 font-mono text-sm text-slate-800">
        ${model.message}
    </p>
</section>
